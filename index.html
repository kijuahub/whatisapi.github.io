<section id="what" class="reveal">
  <h2 class="section-title">Что такое <span class="gradient-text">API</span>?</h2>
  <p class="section-subtitle">Простое объяснение сложного понятия</p>

  <div class="what-is">
    <p><strong>API</strong> (Application Programming Interface) — это набор правил и инструментов, с помощью которых одна программа взаимодействует с другой.</p>
    <p>Представьте, что API — это <strong>посредник</strong>, который принимает запросы от одного приложения, передаёт их другому и возвращает ответ.</p>
    <p>Благодаря API разработчики могут использовать готовые функции и данные других сервисов, не зная их внутреннего устройства.</p>
  </div>

  <div class="analogy">
    <div class="analogy-icon"><i class="fa-solid fa-utensils"></i></div>
    <h3>Аналогия с рестораном</h3>
    <p>Вы (приложение) делаете заказ <strong>официанту</strong> (API). Официант передаёт заказ на кухню (сервер), а потом приносит вам готовое блюдо (данные). Вам не нужно знать, как готовится еда — достаточно знать меню.</p>
  </div>
</section>

            <textarea id="cssCode" placeholder="Введите CSS стили...">* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg: #0a0a14;
    --bg-secondary: #12121f;
    --accent: #dc2626;        /* Красный */
    --accent-2: #ef4444;      /* Светло-красный */
    --accent-3: #b91c1c;      /* Тёмно-красный */
    --accent-4: #f87171;      /* Пастельный красный */

    --font-main: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

  html {
    scroll-behavior: smooth;
  }

  body {
    font-family: var(--font-main);
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
    line-height: 1.6;
  }

  /* Анимированный фон */
  .bg-animation {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
  }

  .bg-animation::before,
  .bg-animation::after {
    content: '';
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.3;
    animation: float 15s ease-in-out infinite;
  }

  .bg-animation::before {
    background: var(--accent);
    top: -200px;
    left: -200px;
  }

  .bg-animation::after {
    background: var(--accent-2);
    bottom: -200px;
    right: -200px;
    animation-delay: -7s;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(100px, 50px) scale(1.1); }
    66% { transform: translate(-50px, 100px) scale(0.9); }
  }

  /* Навигация */
  nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 1.2rem 2rem;
    background: rgba(10, 10, 20, 0.7);
    backdrop-filter: blur(20px);
    z-index: 100;
    border-bottom: 1px solid rgba(220, 38, 38, 0.15);
    animation: slideDown 0.8s ease-out;
  }

  @keyframes slideDown {
    from { transform: translateY(-100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  nav .container {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;

  }

  .logo i {
    margin-right: 0.4rem;
    background: linear-gradient(135deg, var(--accent-4), var(--accent));

    margin-bottom: 1rem;
    display: inline-block;
    animation: bounce 2s ease-in-out infinite;
    color: var(--accent-4);
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }

  .analogy h3 {
    font-size: 1.8rem;
    margin-bottom: 1rem;
    font-weight: 600;
  }

  .analogy p {
    font-size: 1.1rem;

    max-width: 700px;
    margin: 0 auto;
    font-weight: 400;
  }

  /* Схема работы */
  .scheme {
    display: flex;
    align-items: center;
    justify-content: space-around;
    flex-wrap: wrap;
    gap: 1.5rem;
    margin-top: 3rem;
    padding: 3rem 1rem;

    border: 1px solid rgba(220, 38, 38, 0.15);

  .scheme-node {

  .scheme-arrow {

    color: var(--accent-2);

  @keyframes pulse {
    0%, 100% { opacity: 0.5; transform: translateX(0); }
    50% { opacity: 1; transform: translateX(10px); }
  }

  /* Примеры */
  .examples-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 1.5rem;
    margin-top: 2rem;

  .example-card {

    padding: 1.5rem;

    opacity: 0;
    transform: translateY(30px);
  }

  .reveal.visible .example-card {
    opacity: 1;
    transform: translateY(0);

  .reveal.visible .example-card:nth-child(1) { transition: all 0.5s ease 0.1s; }
  .reveal.visible .example-card:nth-child(2) { transition: all 0.5s ease 0.2s; }
  .reveal.visible .example-card:nth-child(3) { transition: all 0.5s ease 0.3s; }
  .reveal.visible .example-card:nth-child(4) { transition: all 0.5s ease 0.4s; }

  .example-card:hover {
    background: rgba(220, 38, 38, 0.05);
    transform: translateY(-5px);
  }

  .example-icon {
    font-size: 2.5rem;
    margin-bottom: 0.8rem;
    color: var(--accent-4);
  }

  .example-card h4 {
    margin-bottom: 0.5rem;
    font-size: 1.1rem;
    font-weight: 600;
  }

  .example-card p {
    color: var(--text-muted);
    font-size: 0.9rem;
    font-weight: 400;
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 3rem 2rem;
    color: var(--text-muted);
    border-top: 1px solid rgba(220, 38, 38, 0.15);
    margin-top: 4rem;
    font-weight: 400;
  }

  /* Адаптив */
  @media (max-width: 768px) {
    .nav-links {
      display: none;
    }
    section {
      padding: 4rem 1.5rem;
    }
    .what-is, .analogy {
      padding: 2rem 1.5rem;
    }
    .scheme-arrow {

        <!-- JS редактор -->
        <div class="editor-panel hidden" id="jsPanel">
            <div class="panel-header">
                ⚡ JavaScript <span>script.js</span>
            </div>
            <textarea id="jsCode" placeholder="Введите JavaScript код...">// Анимация появления секций при скролле
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, {
    threshold: 0.15
  });

  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

  // Параллакс для hero
  const hero = document.querySelector('.hero-content');
  window.addEventListener('scroll', () => {
    const scrolled = window.pageYOffset;
    if (scrolled < window.innerHeight) {
      hero.style.transform = `translateY(${scrolled * 0.3}px)`;
      hero.style.opacity = 1 - scrolled / window.innerHeight;
    }
  });

  // Плавная смена цвета навбара
  const nav = document.querySelector('nav');
  window.addEventListener('scroll', () => {
    if (window.scrollY > 50) {
      nav.style.background = 'rgba(10, 10, 20, 0.9)';
    } else {
      nav.style.background = 'rgba(10, 10, 20, 0.7)';
    }
  });</textarea>
        </div>

        <!-- Панель предпросмотра (View) -->
        <div class="view-panel" id="viewPanel">
            <div class="view-header">
                🌐 Предпросмотр результата
                <button class="refresh-btn" id="refreshView">↻ Обновить</button>
            </div>
            <iframe id="previewFrame" title="Предпросмотр"></iframe>
        </div>
    </div>

    <script>
        (function() {
            // Элементы DOM
            const tabView = document.getElementById('tabView');
            const tabHtml = document.getElementById('tabHtml');
            const tabCss = document.getElementById('tabCss');
            const tabJs = document.getElementById('tabJs');

            const htmlPanel = document.getElementById('htmlPanel');
            const cssPanel = document.getElementById('cssPanel');
            const jsPanel = document.getElementById('jsPanel');
            const viewPanel = document.getElementById('viewPanel');

            const htmlCode = document.getElementById('htmlCode');
            const cssCode = document.getElementById('cssCode');
            const jsCode = document.getElementById('jsCode');
            const previewFrame = document.getElementById('previewFrame');
            const refreshBtn = document.getElementById('refreshView');

            // Функция переключения вкладок
            function setActiveTab(activeTab) {
                // Сброс всех кнопок
                [tabView, tabHtml, tabCss, tabJs].forEach(btn => btn.classList.remove('active'));
                activeTab.classList.add('active');

                // Скрываем все панели редакторов и View
                htmlPanel.classList.add('hidden');
                cssPanel.classList.add('hidden');
                jsPanel.classList.add('hidden');
                viewPanel.classList.add('hidden');

                // Показываем нужную панель
                if (activeTab === tabView) {
                    viewPanel.classList.remove('hidden');
                    // При переключении на View автоматически обновляем предпросмотр
                    updatePreview();
                } else if (activeTab === tabHtml) {
                    htmlPanel.classList.remove('hidden');
                } else if (activeTab === tabCss) {
                    cssPanel.classList.remove('hidden');
                } else if (activeTab === tabJs) {
                    jsPanel.classList.remove('hidden');
                }
            }

            // Функция сборки полного HTML документа из трёх частей
            function buildFullDocument() {
                const html = htmlCode.value;
                const css = cssCode.value;
                const js = jsCode.value;

                return `<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Что такое API?</title>
  <style>${css}</style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  ${html}
  <script>${js}<\/script>
</body>
</html>`;
            }

            // Обновление iframe
            function updatePreview() {
                try {
                    const fullDocument = buildFullDocument();
                    const blob = new Blob([fullDocument], { type: 'text/html' });
                    const url = URL.createObjectURL(blob);

                    // Очищаем предыдущий URL если есть
                    if (previewFrame.src && previewFrame.src.startsWith('blob:')) {
                        URL.revokeObjectURL(previewFrame.src);
                    }

                    previewFrame.src = url;
                } catch (error) {
                    console.error('Ошибка обновления предпросмотра:', error);
                    // В случае ошибки показываем сообщение в iframe
                    const errorDoc = `<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body style="color:red; padding:20px; font-family:monospace;"><h2>Ошибка сборки</h2><pre>${error.message}</pre></body></html>`;
                    const blob = new Blob([errorDoc], { type: 'text/html' });
                    previewFrame.src = URL.createObjectURL(blob);
                }
            }

            // Обработчики кликов по вкладкам
            tabView.addEventListener('click', () => setActiveTab(tabView));
            tabHtml.addEventListener('click', () => setActiveTab(tabHtml));
            tabCss.addEventListener('click', () => setActiveTab(tabCss));
            tabJs.addEventListener('click', () => setActiveTab(tabJs));

            // Кнопка обновления предпросмотра
            refreshBtn.addEventListener('click', updatePreview);

            // Автообновление при изменении кода (с дебаунсом для производительности)
            let debounceTimer;
            function autoUpdatePreview() {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    // Обновляем только если активна вкладка View (чтобы не тратить ресурсы зря)
                    if (!viewPanel.classList.contains('hidden')) {
                        updatePreview();
                    }
                }, 400);
            }

            htmlCode.addEventListener('input', autoUpdatePreview);
            cssCode.addEventListener('input', autoUpdatePreview);
            jsCode.addEventListener('input', autoUpdatePreview);

            // Инициализация: показываем View и загружаем предпросмотр
            setActiveTab(tabView);
            updatePreview();

            // Дополнительно: обработка комбинации Ctrl+Enter для принудительного обновления из любого поля
            document.addEventListener('keydown', function(e) {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    updatePreview();
                    // Переключаемся на View для удобства
                    setActiveTab(tabView);
                }
            });

            console.log('🔧 Инспектор ресурсов готов. Используйте вкладки View, HTML, CSS, JS.');
            console.log('💡 Совет: Ctrl+Enter быстро обновит предпросмотр и переключит на View.');
        })();
    </script>
</body>
</html>
